name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-x86:
    name: Build benchmarks (x86-64)
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libsuitesparse-dev

      - name: Build CHOLMOD benchmark
        run: |
          mkdir -p benchmarks/cholmod/build
          cd benchmarks/cholmod/build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make

      - name: Build KLU benchmark
        run: |
          mkdir -p benchmarks/klu/build
          cd benchmarks/klu/build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make

      - name: Build UMFPACK benchmark
        run: |
          mkdir -p benchmarks/umfpack/build
          cd benchmarks/umfpack/build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make

      - name: Run CHOLMOD benchmark
        run: benchmarks/cholmod/build/bench_cholmod 50 50

      - name: Run KLU benchmark
        run: benchmarks/klu/build/bench_klu

      - name: Run UMFPACK benchmark
        run: benchmarks/umfpack/build/bench_umfpack 50 50

      - name: Download test matrix
        run: |
          mkdir -p matrices
          curl -L "https://suitesparse-collection-website.herokuapp.com/MM/Pajek/HEP-th-new.tar.gz" \
            -o /tmp/HEP-th-new.tar.gz
          tar -xzf /tmp/HEP-th-new.tar.gz -C matrices/

      - name: Build GraphBLAS benchmark (x86-64)
        run: |
          mkdir -p benchmarks/graphblas/build
          cd benchmarks/graphblas/build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make

      - name: Run GraphBLAS benchmark (x86-64)
        run: |
          benchmarks/graphblas/build/bench_graphblas \
            matrices/HEP-th-new/HEP-th-new.mtx

  bench-riscv64:
    name: Benchmark on RISC-V (native)
    runs-on: ubuntu-24.04-riscv

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libsuitesparse-dev

      - name: Download test matrix
        run: |
          mkdir -p matrices
          curl -L "https://suitesparse-collection-website.herokuapp.com/MM/Pajek/HEP-th-new.tar.gz" \
            -o /tmp/HEP-th-new.tar.gz
          tar -xzf /tmp/HEP-th-new.tar.gz -C matrices/

      - name: Run benchmarks via run_riscv64.sh
        run: ./scripts/run_riscv64.sh

      - name: Build all benchmarks with RV64GCV vector extension
        run: |
          REPO=$GITHUB_WORKSPACE
          for bench in cholmod klu umfpack graphblas; do
            mkdir -p $REPO/benchmarks/$bench/build_riscv64_vec
            cmake -S $REPO/benchmarks/$bench \
                  -B $REPO/benchmarks/$bench/build_riscv64_vec \
                  -DCMAKE_BUILD_TYPE=Release \
                  -DCMAKE_CXX_FLAGS="-march=rv64gcv -O3 -DNDEBUG"
            make -C $REPO/benchmarks/$bench/build_riscv64_vec -j$(nproc)
          done

      - name: Run benchmarks with RV64GCV and compare
        run: |
          echo "=== CHOLMOD ==="
          benchmarks/cholmod/build_riscv64_vec/bench_cholmod 316 316 \
            | tee results/cholmod_riscv64_vec.txt
          echo "Without RV64GCV:"; grep "numeric:\|bandwidth:\|arith" results/cholmod_riscv64.txt || true
          echo "With RV64GCV:";    grep "numeric:\|bandwidth:\|arith" results/cholmod_riscv64_vec.txt || true

          echo "=== KLU ==="
          benchmarks/klu/build_riscv64_vec/bench_klu \
            | tee results/klu_riscv64_vec.txt
          echo "Without RV64GCV:"; grep "refactor:\|bandwidth:\|arith" results/klu_riscv64.txt || true
          echo "With RV64GCV:";    grep "refactor:\|bandwidth:\|arith" results/klu_riscv64_vec.txt || true

          echo "=== UMFPACK ==="
          benchmarks/umfpack/build_riscv64_vec/bench_umfpack 100 100 \
            | tee results/umfpack_riscv64_vec.txt
          echo "Without RV64GCV:"; grep "numeric:\|bandwidth:\|arith" results/umfpack_riscv64.txt || true
          echo "With RV64GCV:";    grep "numeric:\|bandwidth:\|arith" results/umfpack_riscv64_vec.txt || true

          echo "=== GraphBLAS ==="
          benchmarks/graphblas/build_riscv64_vec/bench_graphblas \
            matrices/HEP-th-new/HEP-th-new.mtx \
            | tee results/graphblas_riscv64_vec.txt
          echo "Without RV64GCV:"; grep "spgemm:\|bandwidth:\|arith" results/graphblas_riscv64.txt || true
          echo "With RV64GCV:";    grep "spgemm:\|bandwidth:\|arith" results/graphblas_riscv64_vec.txt || true

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: riscv64-native-results
          path: results/

  sanitizers:
    name: Sanitizers (ASan + UBSan)
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libsuitesparse-dev

      - name: Build CHOLMOD with sanitizers
        run: |
          mkdir -p benchmarks/cholmod/build_san
          cd benchmarks/cholmod/build_san
          cmake .. -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer"
          make

      - name: Build KLU with sanitizers
        run: |
          mkdir -p benchmarks/klu/build_san
          cd benchmarks/klu/build_san
          cmake .. -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer"
          make

      - name: Build UMFPACK with sanitizers
        run: |
          mkdir -p benchmarks/umfpack/build_san
          cd benchmarks/umfpack/build_san
          cmake .. -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer"
          make

      - name: Build GraphBLAS with sanitizers
        run: |
          mkdir -p benchmarks/graphblas/build_san
          g++ -O1 -g -std=c++11 \
            -fsanitize=address,undefined -fno-omit-frame-pointer \
            -I/usr/include -I/usr/include/suitesparse \
            benchmarks/graphblas/bench_graphblas.cpp \
            -o benchmarks/graphblas/build_san/bench_graphblas \
            /usr/lib/x86_64-linux-gnu/libgraphblas.so.7 \
            /usr/lib/x86_64-linux-gnu/libsuitesparseconfig.so \
            -lm -lpthread

      - name: Download test matrix
        run: |
          mkdir -p matrices
          curl -L "https://suitesparse-collection-website.herokuapp.com/MM/Pajek/HEP-th-new.tar.gz" \
            -o /tmp/HEP-th-new.tar.gz
          tar -xzf /tmp/HEP-th-new.tar.gz -C matrices/

      - name: Run CHOLMOD with sanitizers
        run: |
          ASAN_OPTIONS=detect_leaks=1 \
          UBSAN_OPTIONS=print_stacktrace=1 \
          benchmarks/cholmod/build_san/bench_cholmod 50 50

      - name: Run KLU with sanitizers
        run: |
          ASAN_OPTIONS=detect_leaks=1 \
          UBSAN_OPTIONS=print_stacktrace=1 \
          benchmarks/klu/build_san/bench_klu

      - name: Run UMFPACK with sanitizers
        run: |
          ASAN_OPTIONS=detect_leaks=1 \
          UBSAN_OPTIONS=print_stacktrace=1 \
          benchmarks/umfpack/build_san/bench_umfpack 50 50

      - name: Run GraphBLAS with sanitizers
        run: |
          ASAN_OPTIONS=detect_leaks=0 \
          UBSAN_OPTIONS=print_stacktrace=1 \
          benchmarks/graphblas/build_san/bench_graphblas \
            matrices/HEP-th-new/HEP-th-new.mtx

  lint:
    name: Lint (clang-format)
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: sudo apt-get install -y clang-format

      - name: Check formatting
        run: find benchmarks -name "*.cpp" | xargs clang-format --dry-run --Werror
