name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-x86:
    name: Build benchmarks (x86-64)
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libsuitesparse-dev

      - name: Build CHOLMOD benchmark
        run: |
          mkdir -p benchmarks/cholmod/build
          cd benchmarks/cholmod/build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make

      - name: Build KLU benchmark
        run: |
          mkdir -p benchmarks/klu/build
          cd benchmarks/klu/build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make

      - name: Build UMFPACK benchmark
        run: |
          mkdir -p benchmarks/umfpack/build
          cd benchmarks/umfpack/build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make

      - name: Run CHOLMOD benchmark
        run: benchmarks/cholmod/build/bench_cholmod 50 50

      - name: Run KLU benchmark
        run: benchmarks/klu/build/bench_klu

      - name: Run UMFPACK benchmark
        run: benchmarks/umfpack/build/bench_umfpack 50 50

  bench-riscv64:
    name: Benchmark on RISC-V (native)
    runs-on: ubuntu-24.04-riscv

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libsuitesparse-dev

      - name: Download test matrix
        run: |
          mkdir -p matrices
          curl -L "https://suitesparse-collection-website.herokuapp.com/MM/Pajek/HEP-th-new.tar.gz" \
            -o /tmp/HEP-th-new.tar.gz
          tar -xzf /tmp/HEP-th-new.tar.gz -C matrices/

      - name: Build CHOLMOD benchmark
        run: |
          mkdir -p benchmarks/cholmod/build_riscv64_native
          cd benchmarks/cholmod/build_riscv64_native
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make

      - name: Build KLU benchmark
        run: |
          mkdir -p benchmarks/klu/build_riscv64_native
          cd benchmarks/klu/build_riscv64_native
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make

      - name: Build UMFPACK benchmark
        run: |
          mkdir -p benchmarks/umfpack/build_riscv64_native
          cd benchmarks/umfpack/build_riscv64_native
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make

      - name: Check GraphBLAS version
        run: |
          dpkg -l | grep graphblas
          nm -D /usr/lib/riscv64-linux-gnu/libgraphblas.so.7 | grep GrB_init | head -5

      - name: Build GraphBLAS benchmark
        run: |
          mkdir -p benchmarks/graphblas/build_riscv64_native
          g++ -O3 -DNDEBUG -std=c++11 \
            -I/usr/include \
            -I/usr/include/suitesparse \
            benchmarks/graphblas/bench_graphblas.cpp \
            -o benchmarks/graphblas/build_riscv64_native/bench_graphblas \
            /usr/lib/riscv64-linux-gnu/libgraphblas.so.7 \
            /usr/lib/riscv64-linux-gnu/libsuitesparseconfig.so \
            -lm -lpthread

      - name: Run CHOLMOD benchmark (native RISC-V)
        run: |
          mkdir -p results
          benchmarks/cholmod/build_riscv64_native/bench_cholmod 316 316 | tee results/cholmod_riscv64_native.txt

      - name: Run KLU benchmark (native RISC-V)
        run: benchmarks/klu/build_riscv64_native/bench_klu | tee results/klu_riscv64_native.txt

      - name: Run UMFPACK benchmark (native RISC-V)
        run: benchmarks/umfpack/build_riscv64_native/bench_umfpack 100 100 | tee results/umfpack_riscv64_native.txt

      - name: Run GraphBLAS benchmark (native RISC-V)
        run: |
          benchmarks/graphblas/build_riscv64_native/bench_graphblas \
            matrices/HEP-th-new/HEP-th-new.mtx | tee results/graphblas_riscv64_native.txt

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: riscv64-native-results
          path: results/

  lint:
    name: Lint (clang-format)
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: sudo apt-get install -y clang-format

      - name: Check formatting
        run: find benchmarks -name "*.cpp" | xargs clang-format --dry-run --Werror
