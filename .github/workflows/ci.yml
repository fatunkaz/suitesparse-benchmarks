name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-x86:
    name: Build benchmarks (x86-64)
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libsuitesparse-dev

      - name: Build CHOLMOD benchmark
        run: |
          mkdir -p benchmarks/cholmod/build
          cd benchmarks/cholmod/build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make

      - name: Build KLU benchmark
        run: |
          mkdir -p benchmarks/klu/build
          cd benchmarks/klu/build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make

      - name: Build UMFPACK benchmark
        run: |
          mkdir -p benchmarks/umfpack/build
          cd benchmarks/umfpack/build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make

      - name: Run CHOLMOD benchmark
        run: benchmarks/cholmod/build/bench_cholmod 50 50

      - name: Run KLU benchmark
        run: benchmarks/klu/build/bench_klu

      - name: Run UMFPACK benchmark
        run: benchmarks/umfpack/build/bench_umfpack 50 50

      - name: Download test matrix
        run: |
          mkdir -p matrices
          curl -L "https://suitesparse-collection-website.herokuapp.com/MM/Pajek/HEP-th-new.tar.gz" \
            -o /tmp/HEP-th-new.tar.gz
          tar -xzf /tmp/HEP-th-new.tar.gz -C matrices/

      - name: Build GraphBLAS benchmark (x86-64)
        run: |
          mkdir -p benchmarks/graphblas/build
          g++ -O3 -DNDEBUG -std=c++11 \
            -I/usr/include \
            -I/usr/include/suitesparse \
            benchmarks/graphblas/bench_graphblas.cpp \
            -o benchmarks/graphblas/build/bench_graphblas \
            /usr/lib/x86_64-linux-gnu/libgraphblas.so.7 \
            /usr/lib/x86_64-linux-gnu/libsuitesparseconfig.so \
            -lm -lpthread

      - name: Run GraphBLAS benchmark (x86-64)
        run: |
          benchmarks/graphblas/build/bench_graphblas \
            matrices/HEP-th-new/HEP-th-new.mtx

  bench-riscv64:
    name: Benchmark on RISC-V (native)
    runs-on: ubuntu-24.04-riscv

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libsuitesparse-dev

      - name: Download test matrix
        run: |
          mkdir -p matrices
          curl -L "https://suitesparse-collection-website.herokuapp.com/MM/Pajek/HEP-th-new.tar.gz"             -o /tmp/HEP-th-new.tar.gz
          tar -xzf /tmp/HEP-th-new.tar.gz -C matrices/

      - name: Run benchmarks via run_riscv64.sh
        run: |
          ls matrices/HEP-th-new/ || echo "Matrix not found"
          ./scripts/run_riscv64.sh || cat results/graphblas_riscv64.txt || echo "No output file"

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: riscv64-native-results
          path: results/

  lint:
    name: Lint (clang-format)
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: sudo apt-get install -y clang-format

      - name: Check formatting
        run: find benchmarks -name "*.cpp" | xargs clang-format --dry-run --Werror
